{% extends "base.html" %}

{% block title %}Eliminar solicitud{% endblock %}

{% block content %}
<div class="card">
    <h2>Eliminar solicitud</h2>
    <p>¿Seguro que deseas eliminar la solicitud <strong>#{{ solicitud.id }}</strong> de <strong>{{ solicitud.embarcacion.nombre_bote }}</strong>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Sí, eliminar</button>
        <a href="{% url 'solicitud_detail' solicitud.id %}" class="btn btn-default">Cancelar</a>
    </form>
</div>
{% endblock %}
